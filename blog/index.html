<!-- latex style table of contents -->
<style>
    .toc {
        margin: 0 0 2.5rem;
    }
    .toc ul { list-style: none; padding-left: 0; }
    /* per-level indent */
    .toc ul ul { padding-left: 2em; }
    .toc li { margin: 0.2rem 0; }
    /* row: title + dotted leaders to margin */
    .toc a {
        display: flex;
        align-items: baseline;
        text-decoration: none;
    }
    .toc a:hover { text-decoration: underline; }
    .toc a::after {
        content: "";
        flex: 1 1 auto;
        margin-left: 0.5em;
        border-bottom: 1px dotted currentColor;
        transform: translateY(-0.25em);
    }
</style>

<!-- render math expressions with katex -->
<script defer>
    window.addEventListener('DOMContentLoaded', () => typeof renderMathInElement !== 'undefined' && renderMathInElement(document.body, {
        delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false},
            {left: '\\(', right: '\\)', display: false},
            {left: '\\[', right: '\\]', display: true},
        ],
        throwOnError: false,
        trust: true,
        strict: false,
        ignoredTags: ['script','noscript','style','textarea','pre','code'],
        ignoredClasses: ['no-math','language-plaintext','highlight']
    }))
</script>
